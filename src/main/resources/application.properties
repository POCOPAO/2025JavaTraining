spring.application.name=M8_Day4_Exercise8.10

# --- H2 (file-based, persists to ./data/training_db.*)
spring.datasource.url=jdbc:h2:file:./data/training_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Ensure data.sql runs AFTER Hibernate creates tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- (Optional) Verbose SQL param logging during demo
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE